<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Analyzer | DMA Performance Monitor</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
            --accent: #ff007c;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(79, 172, 254, 0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 90%;
            max-width: 1200px;
            padding: 3rem 0;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .metric-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 0.5rem;
        }

        .metric-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stream-view {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .stream-view::after {
            content: 'WAITING FOR STREAM...';
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        .indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.5; transform: scale(1); }
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            font-size: 0.8rem;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <header>
        <h1>VIBE STREAM ANALYZER</h1>
    </header>

    <div class="dashboard">
        <div class="card">
            <div class="metric-label">Frame Rate (FPS)</div>
            <div class="metric-value" id="fps">0.0</div>
        </div>
        <div class="card">
            <div class="metric-label">Bandwidth (Mbps)</div>
            <div class="metric-value" id="bandwidth">0.0</div>
        </div>
        <div class="card" style="grid-column: span 2;">
            <div class="metric-label">Live Preview (DMA Buffer A/B)</div>
            <div class="stream-view">
                <div class="indicator">
                    <span class="dot"></span>
                    <span style="font-size: 0.7rem; font-weight: bold;">LIVE</span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        ADV-15 UNIT: IMAGE PROCESSING & DMA OPTIMIZATION
    </footer>
</body>
</html>
