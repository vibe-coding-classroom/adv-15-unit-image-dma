name: GitHub Classroom Autograding
on: [push]
jobs:
  autograding:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '16'
      - name: Install dependencies
        run: npm install
      - name: DMA Alignment Test
        id: dma-alignment
        uses: education/autograding-command-grader@v1
        with:
          test-name: DMA Alignment
          command: npm test tests/dma_alignment.test.js
          timeout: 10
      - name: Structural Verification
        id: structural-verification
        uses: education/autograding-command-grader@v1
        with:
          test-name: Project Structure
          command: npm test tests/autograding.test.js
          timeout: 10
      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        with:
          runners: dma-alignment,structural-verification
